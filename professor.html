<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教授紹介 | 宇宙物理環境・計測研究室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ HEADER ============ -->
<div id="site-header"></div>

<!-- ============ PAGE TITLE BAND ============ -->
<section class="page-hero">
  <div class="page-hero__bg">
    <img src="./images/professor-hero.jpg" alt=""
         onerror="this.onerror=null;this.src='./images/overview-hero.jpg'">
  </div>
  <h1>教授紹介</h1>
</section>

<!-- ============ PROFESSOR CONTENT ============ -->
<section class="content">
  <div class="tabs" role="tablist">
    <span class="tab is-active" role="tab" data-tab="intro">紹介</span>
    <span class="tab" role="tab" data-tab="achievements">活動実績</span>
  </div>

  <!-- 紹介 -->
  <div class="tab-panel" id="panel-intro">
    <article class="card">
      <h2 class="card__title">小林 正規　教授</h2>
      <div class="card__body">
        <img class="card__img" src="./images/professor.jpg" alt="小林 正規 教授"
             onerror="this.onerror=null;this.style.display='none'">
        <div class="card__text">
          <p>自己紹介など記入</p>
        </div>
      </div>
    </article>

    <article class="card">
      <h2 class="card__title">研究内容のタイトルとか２</h2>
      <div class="card__body">
        <div class="card__text">
          <p>研究内容の詳細について記載してください。</p>
          <p>研究内容、研究実績以外にも記載できることがあればタブを増やして対応<br>写真とかもいい感じに入れる</p>
        </div>
        <img class="card__img" src="./images/planet.jpg" alt=""
             onerror="this.onerror=null;this.src='https://www.figma.com/api/mcp/asset/e912fda0-afc3-47f4-8d89-801aad4e08e3'">
      </div>
    </article>
  </div>

  <!-- 活動実績 -->
  <div class="tab-panel" id="panel-achievements" hidden>
    <article class="card">
      <h2 class="card__title">実績に関するタイトルなどあれば</h2>
      <div class="card__body">
        <div class="card__text">
          <p>上記実績に関する紹介文、写真など</p>
        </div>
      </div>
    </article>
  </div>
</section>

<!-- ============ FOOTER ============ -->
<div id="site-footer"></div>


<script src="components.js" defer></script>
<script src="script.js" defer></script>
</body>
</html>
